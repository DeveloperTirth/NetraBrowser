<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Netra Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div id="browser-ui">
  <div id="app">
    <!-- Tab Bar -->
    <div id="tabBar"></div>

    <!-- Navigation Bar -->
    <div id="navBar">
      <button id="back" class="nav-btn" title="Go back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <button id="forward" class="nav-btn" title="Go forward">
        <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
      </button>
      <button id="reload" class="nav-btn" title="Reload">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <input id="address" placeholder="Search or enter URL" />
      <button id="newTab" class="nav-btn" title="New Tab">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
      <button id="toggleAI" class="nav-btn ai-toggle-btn" title="Toggle AI Panel">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      </button>
      <button id="settingsBtn" class="nav-btn" title="Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      </button>
    </div>

    <!-- Agent Running Indicator -->
    <div id="agentBar" class="agent-bar" style="display: none;">
      <div class="agent-pulse"></div>
      <span id="agentBarText">Netra is browsing...</span>
      <button id="agentStop" class="agent-stop-btn">Stop</button>
    </div>

    <!-- Main Content Area -->
    <div id="main">
      <div id="webviews"></div>

      <!-- Drag handle to resize AI panel -->
      <div id="resizeHandle" class="resize-handle"></div>

      <!-- AI Panel (togglable) -->
      <div id="aiPanel">
        <div id="aiHeader">
          <span class="ai-label">Netra AI</span>
          <span class="ai-status" id="aiStatus"></span>
        </div>

        <div id="aiMessages"></div>

        <div id="aiInputBar">
          <div class="input-wrapper">
            <input id="input" placeholder="Ask Netra anything..." />
            <button id="aiSend" title="Send">
              <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
  </div>

  <!-- BYOK/Settings Modal -->
  <div id="settingsModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="closeSettingsBtn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label for="aiProvider">Provider</label>
          <select id="aiProvider">
            <option value="ollama">Ollama (Local)</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="gemini">Gemini</option>
          </select>
        </div>

        <div id="apiKeyGroup" class="field-group" style="display: none;">
          <label for="apiKey">API Key</label>
          <input type="password" id="apiKey" placeholder="Enter your API key">
        </div>

        <div id="modelNameGroup" class="field-group">
          <label for="aiModelName">Model</label>
          <input type="text" id="aiModelName" value="qwen3-vl:4b-instruct">
          <small id="modelHelpText">e.g. qwen3-vl:4b-instruct, gpt-4o, claude-3-5-sonnet, gemini-2.5-flash</small>
        </div>

        <div id="ollamaGuide" class="ollama-guide" style="display: none;">
          <strong>Ollama not detected</strong>
          <p>Ollama is not installed or running on your system.</p>
          <ol>
            <li>Download from <a href="https://ollama.com/download" target="_blank">ollama.com</a></li>
            <li>Install the application</li>
            <li>Restart this browser</li>
          </ol>
        </div>
      </div>
      <div class="modal-footer">
        <button id="saveSettingsBtn" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

</body>
<script type="module" src="./renderer.js"></script>

</html>
